name: .NET CI + Sonar Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build-sonar:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ✅ Install Sonar Scanner
      - name: Install SonarScanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ✅ Restore
      - name: Restore
        run: dotnet restore DemoApp.sln

      # 🔥 Sonar Begin (PR)
      - name: Sonar Begin (PR)
        if: github.event_name == 'pull_request'
        run: |
          dotnet sonarscanner begin \
            /k:"demo-dotnet-sonar" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.pullrequest.key="${{ github.event.pull_request.number }}" \
            /d:sonar.pullrequest.branch="${{ github.head_ref }}" \
            /d:sonar.pullrequest.base="${{ github.base_ref }}"

      # 🔥 Sonar Begin (Push)
      - name: Sonar Begin (Push)
        if: github.event_name != 'pull_request'
        run: |
          dotnet sonarscanner begin \
            /k:"demo-dotnet-sonar" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      # ✅ Build
      - name: Build
        run: dotnet build DemoApp.sln --no-restore --configuration Release

      # ✅ Test with Coverage
      - name: Test
        run: |
          dotnet test DemoApp.sln \
            --no-build \
            --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./coverage/

      # ✅ Sonar End
      - name: Sonar End
        run: |
          dotnet sonarscanner end \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

      # 🔍 Debug (optional but useful)
      - name: Debug Sonar Files
        run: |
          ls -la
          ls -la .scannerwork || echo "No scannerwork folder"

      # ✅ Quality Gate (ONLY if Sonar succeeded)
      - name: Sonar Quality Gate
        if: success()
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}